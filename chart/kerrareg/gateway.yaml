apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: istio-ingress-gateway
  namespace: istio-ingress
spec:
  selector:
    istio: ingress
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    hosts:
    - "kerrareg.defdev.io"
    tls:
      mode: SIMPLE
      credentialName: istio-ingress-gateway-certs