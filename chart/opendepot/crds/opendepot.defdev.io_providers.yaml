---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: providers.opendepot.defdev.io
spec:
  group: opendepot.defdev.io
  names:
    kind: Provider
    listKind: ProviderList
    plural: providers
    singular: provider
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: The latest version of the provider
      jsonPath: .status.latestVersion
      name: LatestVersion
      type: string
    - description: The name of the provider
      jsonPath: .spec.providerConfig.name
      name: Name
      type: string
    - description: Whether the Provider has synced successfully
      jsonPath: .status.synced
      name: Synced
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Provider is the Schema for the Providers API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProviderSpec defines the desired state of a OpenDepot Provider.
            properties:
              forceSync:
                description: A flag to force a provider to synchronize
                type: boolean
              providerConfig:
                description: The configuration details for the provider that will
                  be used to create each ProviderVersion
                properties:
                  architectures:
                    description: The architecture(s) that the provider supports. This
                      is used to set the 'arch' constraint in the provider's versions.
                    items:
                      type: string
                    type: array
                  githubClientConfig:
                    description: |-
                      The Github client configuration settings for source scanning. When set with
                      useAuthenticatedClient: true, the version controller will use a GitHub App to
                      authenticate requests when fetching the provider's go.mod for source scanning.
                      This is recommended for private source repositories and to avoid GitHub API rate limiting.
                      The namespace where the Version resource exists must contain a Secret named
                      'opendepot-github-application-secret' with githubAppID, githubInstallID, and
                      githubPrivateKey fields (private key must be base64 encoded).
                    properties:
                      useAuthenticatedClient:
                        description: |-
                          This flag determines whether the GitHub client used to download modules
                          will be authenticated with a Github App. It's highly recommended
                          to enable this flag to avoid GitHub API rate limiting. When enabled, the namespace where the Module resource exists
                          must contain a Secret named 'opendepot-github-application-secret'. The secret must contain a githubAppID,
                          githubInstallID, and githubPrivateKey field. The private key must also be base64 encoded before being added
                          as data to the secret. When accessed, the controller will base64 decode the key to build an in-memory client
                          to authenticate with the Github API.
                        type: boolean
                    type: object
                  name:
                    description: |-
                      The name of the provider. If omitted, the name of the Provider resource
                      is used in its place.
                    type: string
                  namespace:
                    description: |-
                      The namespace (organization) of the provider in the OpenTofu registry,
                      e.g. 'hashicorp', 'integrations', 'DataDog'. Defaults to 'hashicorp' when omitted,
                      preserving backwards compatibility for existing Provider resources.
                    type: string
                  operatingSystems:
                    description: The OS(s) that the provider supports. This is used
                      to set the 'os' constraint in the provider's versions.
                    items:
                      type: string
                    type: array
                  sourceRepository:
                    description: |-
                      The URL of the provider's source repository on GitHub, e.g. 'https://github.com/hashicorp/terraform-provider-aws'.
                      When omitted, OpenDepot looks up the repository from the OpenTofu registry (api.opentofu.org).
                      If the registry lookup fails, it falls back to 'github.com/{namespace}/terraform-provider-{name}'.
                      If the repository cannot be resolved, scanning falls back to binary-only mode.
                    type: string
                  storageConfig:
                    description: The external storage configuration settings.
                    properties:
                      azureStorage:
                        properties:
                          accountName:
                            description: The Azure Storage Account name.
                            type: string
                          accountUrl:
                            description: The Azure Storage Account URL.
                            type: string
                          resourceGroup:
                            description: The Azure Resource Group where the Azure
                              Storage Account is located.
                            type: string
                          subscriptionID:
                            description: The Azure subscription ID where the Azure
                              Storage Account is located.
                            type: string
                        required:
                        - accountName
                        - accountUrl
                        - resourceGroup
                        - subscriptionID
                        type: object
                      fileSystem:
                        description: The configuration settings for storing Versions
                          on a local filesystem.
                        properties:
                          directoryPath:
                            description: The directory path on the file system where
                              the Version will be stored.
                            type: string
                        type: object
                      gcs:
                        description: The configuration settings for storing Versions
                          in a Google Cloud Storage bucket.
                        properties:
                          bucket:
                            description: The GCS bucket name.
                            type: string
                        required:
                        - bucket
                        type: object
                      s3:
                        description: The configuration settings for storing Versions
                          in an Amazon S3 bucket.
                        properties:
                          bucket:
                            description: The S3 bucket name.
                            type: string
                          key:
                            description: |-
                              The S3 bucket key, ie: 'my/bucket/prefix'
                              The file name will be automatically generated by the opendepot-module-controller.
                            type: string
                          region:
                            description: The AWS region for the bucket.
                            type: string
                        required:
                        - bucket
                        - region
                        type: object
                      presign:
                        description: Presign is the optional configuration for pre-signed URL generation.
                        properties:
                          enabled:
                            description: When true, download requests are redirected via a pre-signed URL.
                            type: boolean
                          fallbackToProxy:
                            default: true
                            description: When true, presign failures fall back to proxying the download.
                            type: boolean
                          ttl:
                            default: "15m"
                            description: TTL controls how long the pre-signed URL remains valid (e.g. "15m").
                            type: string
                        type: object
                    type: object
                  versionConstraints:
                    description: |-
                      A comma-separated list of version constraints such as
                      '1.2.1' or '>= 1.0.0, < 2.0.0' or '~> 1.0.0'. This field is only
                      respected by the Depot controller.
                    type: string
                  versionHistoryLimit:
                    description: The version history limit for the provider.
                    type: integer
                type: object
              versions:
                description: |-
                  The version of the provider. This should be a list of maps with semantic version tags. For example, 'version: v1.0.0', or 'version: 1.0.0'.
                  The version controller will automatically trim any leading 'v' character to make them compatible
                  with the registry protocol
                items:
                  description: ProviderVersion holds details about the Version resource
                    under management.
                  properties:
                    architecture:
                      description: The system architecture this Version of the Provider
                        supports.
                      type: string
                    name:
                      description: The name of the provider.
                      type: string
                    operatingSystem:
                      description: The operating system this Version of the Provider
                        supports.
                      type: string
                    synced:
                      description: Whether the Version for the Provider has synced
                        or not.
                      type: boolean
                    version:
                      description: The version of the provider.
                      type: string
                  type: object
                type: array
            required:
            - providerConfig
            - versions
            type: object
          status:
            description: ProviderStatus defines the observed state of a provider.
            properties:
              fileName:
                description: The randomly generated filename with its file extension.
                type: string
              latestVersion:
                description: The latest available version of the provider
                type: string
              providerVersionRefs:
                additionalProperties:
                  description: ProviderVersion holds details about the Version resource
                    under management.
                  properties:
                    architecture:
                      description: The system architecture this Version of the Provider
                        supports.
                      type: string
                    name:
                      description: The name of the provider.
                      type: string
                    operatingSystem:
                      description: The operating system this Version of the Provider
                        supports.
                      type: string
                    synced:
                      description: Whether the Version for the Provider has synced
                        or not.
                      type: boolean
                    version:
                      description: The version of the provider.
                      type: string
                  type: object
                description: A slice of the ProviderVersionRefs that have been successfully
                  created by the controller
                type: object
              sourceScan:
                description: |-
                  The most recent source vulnerability scan result for this provider.
                  Populated by the Version controller after scanning the provider's source code (go.mod).
                  Deduplicated across all OS/arch Version resources for the same provider version.
                properties:
                  findings:
                    description: The list of vulnerabilities found in the provider's
                      source dependencies (go.mod).
                    items:
                      description: SecurityFinding represents a single vulnerability
                        finding from a Trivy scan.
                      properties:
                        fixedVersion:
                          description: The minimum version of the package that resolves
                            the vulnerability, if known.
                          type: string
                        installedVersion:
                          description: The version of the package currently in use.
                          type: string
                        pkgName:
                          description: The name of the package containing the vulnerability.
                          type: string
                        severity:
                          description: 'The severity of the vulnerability: CRITICAL,
                            HIGH, MEDIUM, LOW, or UNKNOWN.'
                          type: string
                        title:
                          description: A short description of the vulnerability.
                          type: string
                        vulnerabilityID:
                          description: The CVE or GHSA identifier for the vulnerability.
                          type: string
                      required:
                      - installedVersion
                      - pkgName
                      - severity
                      - vulnerabilityID
                      type: object
                    type: array
                  scannedAt:
                    description: The RFC3339 timestamp at which the source scan completed.
                    type: string
                  version:
                    description: The provider version that was scanned. Used for deduplication
                      across OS/arch Version resources.
                    type: string
                required:
                - scannedAt
                - version
                type: object
              syncStatus:
                description: A field for declaring current status information about
                  how the resource is being reconciled
                type: string
              synced:
                description: A flag to determine if the provider has successfully
                  synced to its desired state
                type: boolean
            required:
            - syncStatus
            - synced
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
