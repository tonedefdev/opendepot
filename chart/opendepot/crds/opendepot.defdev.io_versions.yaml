---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: versions.opendepot.defdev.io
spec:
  group: opendepot.defdev.io
  names:
    kind: Version
    listKind: VersionList
    plural: versions
    singular: version
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: The type of resource. Either 'Module' or 'Provider'
      jsonPath: .spec.type
      name: Type
      type: string
    - description: Whether the Version has synced successfully
      jsonPath: .status.synced
      name: Synced
      type: string
    - description: The base64 encoded SHA256 checksum of the file Version
      jsonPath: .status.checksum
      name: Checksum
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Version is the Schema for the Version API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: VersionSpec defines a specific version of a OpenDepot Module
              or Provider.
            properties:
              architecture:
                description: The system architecture this Version of the Provider
                  supports.
                type: string
              fileName:
                description: |-
                  The name of the file with its extension.
                  For a Module the file extension must be one of .zip or .tar.gz
                  since terraform/tofu currently only support these two
                  extension types.
                type: string
              forceSync:
                description: A flag to force a module version to synchronize.
                type: boolean
              moduleConfigRef:
                description: The reference to the Module resource's config.
                properties:
                  fileFormat:
                    description: |-
                      The file format of the module
                      This must be one of 'zip' or 'tar'.
                    type: string
                  githubClientConfig:
                    description: The Github client configuration settings.
                    properties:
                      useAuthenticatedClient:
                        description: |-
                          This flag determines whether the GitHub client used to download modules
                          will be authenticated with a Github App. It's highly recommended
                          to enable this flag to avoid GitHub API rate limiting. When enabled, the namespace where the Module resource exists
                          must contain a Secret named 'opendepot-github-application-secret'. The secret must contain a githubAppID,
                          githubInstallID, and githubPrivateKey field. The private key must also be base64 encoded before being added
                          as data to the secret. When accessed, the controller will base64 decode the key to build an in-memory client
                          to authenticate with the Github API.
                        type: boolean
                    type: object
                  immutable:
                    description: |-
                      When true, enforces that the ChecksumSHA256 of the module archive
                      always matches the value stored in this field and in any destination storage config.
                    type: boolean
                  name:
                    description: |-
                      The name of the module. If omitted, the name of the Module resource
                      is used in its place.
                    type: string
                  provider:
                    description: The main terraform or tofu provider required for
                      this module.
                    type: string
                  repoOwner:
                    description: Owner of the Github repository.
                    type: string
                  repoUrl:
                    description: The full URL of the Github repository.
                    type: string
                  storageConfig:
                    description: The external storage configuration settings.
                    properties:
                      azureStorage:
                        properties:
                          accountName:
                            description: The Azure Storage Account name.
                            type: string
                          accountUrl:
                            description: The Azure Storage Account URL.
                            type: string
                          resourceGroup:
                            description: The Azure Resource Group where the Azure
                              Storage Account is located.
                            type: string
                          subscriptionID:
                            description: The Azure subscription ID where the Azure
                              Storage Account is located.
                            type: string
                        required:
                        - accountName
                        - accountUrl
                        - resourceGroup
                        - subscriptionID
                        type: object
                      fileSystem:
                        description: The configuration settings for storing Versions
                          on a local filesystem.
                        properties:
                          directoryPath:
                            description: The directory path on the file system where
                              the Version will be stored.
                            type: string
                        type: object
                      gcs:
                        description: The configuration settings for storing Versions
                          in a Google Cloud Storage bucket.
                        properties:
                          bucket:
                            description: The GCS bucket name.
                            type: string
                        required:
                        - bucket
                        type: object
                      presign:
                        description: Presign is the optional configuration for pre-signed
                          URL generation.
                        properties:
                          enabled:
                            description: When true, download requests are redirected
                              to the storage backend via a pre-signed URL.
                            type: boolean
                          fallbackToProxy:
                            default: true
                            description: |-
                              When true, if pre-sign generation fails the server falls back to proxying the download.
                              Defaults to true.
                            type: boolean
                          ttl:
                            default: 15m
                            description: |-
                              TTL controls how long the pre-signed URL remains valid (e.g. "15m", "1h").
                              If omitted, defaults to 15 minutes.
                            type: string
                        type: object
                      s3:
                        description: The configuration settings for storing Versions
                          in an Amazon S3 bucket.
                        properties:
                          bucket:
                            description: The S3 bucket name.
                            type: string
                          key:
                            description: |-
                              The S3 bucket key, ie: 'my/bucket/prefix'
                              The file name will be automatically generated by the opendepot-module-controller.
                            type: string
                          region:
                            description: The AWS region for the bucket.
                            type: string
                        required:
                        - bucket
                        - region
                        type: object
                    type: object
                  versionConstraints:
                    description: |-
                      A comma separated list of version constraints such as
                      '1.2.1' or '>= 1.0.0, < 2.0.0' or '~> 1.0.0, != 1.0.2'. This field is only
                      respected by the Depot controller.
                    type: string
                  versionHistoryLimit:
                    description: The number of versions to keep stored in the registry
                      at any given time.
                    type: integer
                type: object
              operatingSystem:
                description: The operating system this Version of the Provider supports.
                type: string
              providerConfigRef:
                description: The reference to the Provider resource's config.
                properties:
                  architectures:
                    description: The architecture(s) that the provider supports. This
                      is used to set the 'arch' constraint in the provider's versions.
                    items:
                      type: string
                    type: array
                  githubClientConfig:
                    description: |-
                      The Github client configuration settings for source scanning. When set with
                      useAuthenticatedClient: true, the version controller will use a GitHub App to
                      authenticate requests when fetching the provider's go.mod for source scanning.
                      This is recommended for private source repositories and to avoid GitHub API rate limiting.
                      The namespace where the Version resource exists must contain a Secret named
                      'opendepot-github-application-secret' with githubAppID, githubInstallID, and
                      githubPrivateKey fields (private key must be base64 encoded).
                    properties:
                      useAuthenticatedClient:
                        description: |-
                          This flag determines whether the GitHub client used to download modules
                          will be authenticated with a Github App. It's highly recommended
                          to enable this flag to avoid GitHub API rate limiting. When enabled, the namespace where the Module resource exists
                          must contain a Secret named 'opendepot-github-application-secret'. The secret must contain a githubAppID,
                          githubInstallID, and githubPrivateKey field. The private key must also be base64 encoded before being added
                          as data to the secret. When accessed, the controller will base64 decode the key to build an in-memory client
                          to authenticate with the Github API.
                        type: boolean
                    type: object
                  name:
                    description: |-
                      The name of the provider. If omitted, the name of the Provider resource
                      is used in its place.
                    type: string
                  namespace:
                    description: |-
                      The namespace (organization) of the provider in the OpenTofu registry,
                      e.g. 'hashicorp', 'integrations', 'DataDog'. Defaults to 'hashicorp' when omitted,
                      preserving backwards compatibility for existing Provider resources.
                    type: string
                  operatingSystems:
                    description: The OS(s) that the provider supports. This is used
                      to set the 'os' constraint in the provider's versions.
                    items:
                      type: string
                    type: array
                  sourceRepository:
                    description: |-
                      The URL of the provider's source repository on GitHub, e.g. 'https://github.com/hashicorp/terraform-provider-aws'.
                      When omitted, OpenDepot looks up the repository from the OpenTofu registry (api.opentofu.org).
                      If the registry lookup fails, it falls back to 'github.com/{namespace}/terraform-provider-{name}'.
                      If the repository cannot be resolved, scanning falls back to binary-only mode.
                    type: string
                  storageConfig:
                    description: The external storage configuration settings.
                    properties:
                      azureStorage:
                        properties:
                          accountName:
                            description: The Azure Storage Account name.
                            type: string
                          accountUrl:
                            description: The Azure Storage Account URL.
                            type: string
                          resourceGroup:
                            description: The Azure Resource Group where the Azure
                              Storage Account is located.
                            type: string
                          subscriptionID:
                            description: The Azure subscription ID where the Azure
                              Storage Account is located.
                            type: string
                        required:
                        - accountName
                        - accountUrl
                        - resourceGroup
                        - subscriptionID
                        type: object
                      fileSystem:
                        description: The configuration settings for storing Versions
                          on a local filesystem.
                        properties:
                          directoryPath:
                            description: The directory path on the file system where
                              the Version will be stored.
                            type: string
                        type: object
                      gcs:
                        description: The configuration settings for storing Versions
                          in a Google Cloud Storage bucket.
                        properties:
                          bucket:
                            description: The GCS bucket name.
                            type: string
                        required:
                        - bucket
                        type: object
                      presign:
                        description: Presign is the optional configuration for pre-signed
                          URL generation.
                        properties:
                          enabled:
                            description: When true, download requests are redirected
                              to the storage backend via a pre-signed URL.
                            type: boolean
                          fallbackToProxy:
                            default: true
                            description: |-
                              When true, if pre-sign generation fails the server falls back to proxying the download.
                              Defaults to true.
                            type: boolean
                          ttl:
                            default: 15m
                            description: |-
                              TTL controls how long the pre-signed URL remains valid (e.g. "15m", "1h").
                              If omitted, defaults to 15 minutes.
                            type: string
                        type: object
                      s3:
                        description: The configuration settings for storing Versions
                          in an Amazon S3 bucket.
                        properties:
                          bucket:
                            description: The S3 bucket name.
                            type: string
                          key:
                            description: |-
                              The S3 bucket key, ie: 'my/bucket/prefix'
                              The file name will be automatically generated by the opendepot-module-controller.
                            type: string
                          region:
                            description: The AWS region for the bucket.
                            type: string
                        required:
                        - bucket
                        - region
                        type: object
                    type: object
                  versionConstraints:
                    description: |-
                      A comma-separated list of version constraints such as
                      '1.2.1' or '>= 1.0.0, < 2.0.0' or '~> 1.0.0'. This field is only
                      respected by the Depot controller.
                    type: string
                  versionHistoryLimit:
                    description: The version history limit for the provider.
                    type: integer
                type: object
              type:
                description: The type of resource. Either 'Module' or 'Provider'
                type: string
              version:
                description: The version of the Module or Provider.
                type: string
            required:
            - type
            - version
            type: object
          status:
            description: VersionStatus defines the current status of the resource.
            properties:
              binaryScan:
                description: |-
                  The binary vulnerability scan result for this specific provider artifact.
                  Only populated for provider Version resources when scanning is enabled.
                properties:
                  findings:
                    description: The list of vulnerabilities found in the compiled
                      provider binary.
                    items:
                      description: SecurityFinding represents a single vulnerability
                        finding from a Trivy scan.
                      properties:
                        fixedVersion:
                          description: The minimum version of the package that resolves
                            the vulnerability, if known.
                          type: string
                        installedVersion:
                          description: The version of the package currently in use.
                          type: string
                        pkgName:
                          description: The name of the package containing the vulnerability.
                          type: string
                        severity:
                          description: 'The severity of the vulnerability: CRITICAL,
                            HIGH, MEDIUM, LOW, or UNKNOWN.'
                          type: string
                        title:
                          description: A short description of the vulnerability.
                          type: string
                        vulnerabilityID:
                          description: The CVE or GHSA identifier for the vulnerability.
                          type: string
                      required:
                      - installedVersion
                      - pkgName
                      - severity
                      - vulnerabilityID
                      type: object
                    type: array
                  scannedAt:
                    description: The RFC3339 timestamp at which the binary scan completed.
                    type: string
                required:
                - scannedAt
                type: object
              checksum:
                description: The SHA256 checksum of the module as a base64 encoded
                  string.
                type: string
              sourceScan:
                description: |-
                  The IaC source scan result for this specific module version archive.
                  Only populated for module Version resources when scanning is enabled.
                properties:
                  findings:
                    description: The list of IaC findings found in the module's HCL
                      source.
                    items:
                      description: SecurityFinding represents a single vulnerability
                        finding from a Trivy scan.
                      properties:
                        fixedVersion:
                          description: The minimum version of the package that resolves
                            the vulnerability, if known.
                          type: string
                        installedVersion:
                          description: The version of the package currently in use.
                          type: string
                        pkgName:
                          description: The name of the package containing the vulnerability.
                          type: string
                        severity:
                          description: 'The severity of the vulnerability: CRITICAL,
                            HIGH, MEDIUM, LOW, or UNKNOWN.'
                          type: string
                        title:
                          description: A short description of the vulnerability.
                          type: string
                        vulnerabilityID:
                          description: The CVE or GHSA identifier for the vulnerability.
                          type: string
                      required:
                      - installedVersion
                      - pkgName
                      - severity
                      - vulnerabilityID
                      type: object
                    type: array
                  scannedAt:
                    description: The RFC3339 timestamp at which the source scan completed.
                    type: string
                required:
                - scannedAt
                type: object
              syncStatus:
                description: The Version's reconciliation status.
                type: string
              synced:
                description: A flag that determines whether the Version has been successfully
                  reconciled.
                type: boolean
            required:
            - checksum
            - syncStatus
            - synced
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
