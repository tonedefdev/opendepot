{{- if .Values.server.ingress.istio.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: opendepot-server
  namespace: {{ .Values.global.namespace }}
spec:
  hosts:
  {{- range .Values.server.ingress.istio.hosts }}
  - {{ . | quote }}
  {{- end }}
  gateways:
  - {{ .Values.server.ingress.istio.gateway }}
  http:
  {{- if .Values.ui.enabled }}
  # Registry protocol and API paths route to the server service.
  - name: opendepot-server-protocol
    match:
    - uri:
        prefix: /opendepot
    - uri:
        prefix: /.well-known
    {{- if and .Values.server.oidc.enabled .Values.server.oidc.dexProxy.enabled }}
    - uri:
        prefix: /dex
    {{- end }}
    route:
    - destination:
        host: server
        port:
          number: {{ .Values.server.service.port }}
  # Root and all remaining paths route to the UI service.
  - name: opendepot-ui
    route:
    - destination:
        host: ui
        port:
          number: {{ .Values.ui.service.port }}
  {{- else }}
  - name: opendepot-server
    route:
    - destination:
        host: server
        port:
          number: {{ .Values.server.service.port }}
  {{- end }}
{{- end }}
