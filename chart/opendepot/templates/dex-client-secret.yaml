{{- if and .Values.dex.enabled .Values.server.oidc.enabled }}
{{- if not .Values.server.oidc.clientSecretName }}
{{- if not .Values.server.oidc.clientSecret }}
{{- fail "Either server.oidc.clientSecret or server.oidc.clientSecretName must be set when dex and OIDC are enabled. Prefer server.oidc.clientSecretName (referencing a pre-existing Kubernetes Secret) to avoid storing credentials in Helm release history." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: opendepot-dex-client-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app: opendepot-dex
type: Opaque
stringData:
  clientSecret: {{ .Values.server.oidc.clientSecret | quote }}
  OPENDEPOT_DEX_CLIENT_SECRET: {{ .Values.server.oidc.clientSecret | quote }}
{{- end }}
{{- end }}
