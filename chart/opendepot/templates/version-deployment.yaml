{{- if .Values.version.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: version-controller
  namespace: {{ .Values.global.namespace }}
  labels:
    app: version-controller
    control-plane: controller
spec:
  replicas: {{ .Values.version.replicaCount }}
  selector:
    matchLabels:
      app: version-controller
      control-plane: controller
  template:
    metadata:
      labels:
        app: version-controller
        control-plane: controller
    spec:
      serviceAccountName: version-controller
      securityContext:
        {{- if not (and .Values.storage.filesystem.enabled .Values.storage.filesystem.hostPath) }}
        runAsNonRoot: true
        {{- end }}
        runAsUser: 65532
        {{- if .Values.storage.filesystem.enabled }}
        fsGroup: 65532
        {{- end }}
      {{- if and .Values.storage.filesystem.enabled .Values.storage.filesystem.hostPath }}
      initContainers:
      - name: fix-permissions
        image: busybox:1.37
        command: ["sh", "-c", "chown -R 65532:65532 {{ .Values.storage.filesystem.mountPath }}"]
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: modules
          mountPath: {{ .Values.storage.filesystem.mountPath }}
      {{- end }}
      containers:
      - name: version-controller
        image: "{{ .Values.version.image.repository }}:{{ default .Values.global.image.tag .Values.version.image.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        {{- if or .Values.scanning.enabled .Values.version.zapLogLevel }}
        args:
        {{- if .Values.scanning.enabled }}
        - --scanning-enabled=true
        - --trivy-cache-dir={{ .Values.scanning.cacheMountPath }}
        - --scan-offline={{ .Values.scanning.offline }}
        - --scan-block-on-critical={{ .Values.scanning.blockOnCritical }}
        - --scan-block-on-high={{ .Values.scanning.blockOnHigh }}
        - --scan-modules={{ .Values.scanning.scanModules }}
        {{- end }}
        {{- if .Values.version.zapLogLevel }}
        - --zap-log-level={{ .Values.version.zapLogLevel }}
        {{- end }}
        {{- end }}
        {{- if .Values.rbac.scopeToNamespace }}
        env:
        - name: WATCH_NAMESPACE
          value: {{ .Values.global.namespace }}
        {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          {{- if not (or .Values.storage.filesystem.enabled .Values.scanning.enabled) }}
          readOnlyRootFilesystem: true
          {{- end }}
        resources:
          {{- toYaml .Values.version.resources | nindent 10 }}
        {{- if or .Values.storage.filesystem.enabled .Values.scanning.enabled }}
        volumeMounts:
        {{- if .Values.storage.filesystem.enabled }}
        - name: modules
          mountPath: {{ .Values.storage.filesystem.mountPath }}
        {{- end }}
        {{- if .Values.scanning.enabled }}
        - name: trivy-cache
          mountPath: {{ .Values.scanning.cacheMountPath }}
        {{- end }}
        {{- end }}
      {{- if or .Values.storage.filesystem.enabled .Values.scanning.enabled }}
      volumes:
      {{- if .Values.storage.filesystem.enabled }}
      - name: modules
        {{- if .Values.storage.filesystem.hostPath }}
        hostPath:
          path: {{ .Values.storage.filesystem.hostPath }}
          type: DirectoryOrCreate
        {{- else }}
        persistentVolumeClaim:
          claimName: opendepot-modules
        {{- end }}
      {{- end }}
      {{- if .Values.scanning.enabled }}
      - name: trivy-cache
        persistentVolumeClaim:
          claimName: opendepot-trivy-cache
      {{- end }}
      {{- end }}
      {{- with .Values.version.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.version.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.version.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
