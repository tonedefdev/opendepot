{{- if .Values.ui.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: {{ .Values.global.namespace }}
  labels:
    app: ui
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      serviceAccountName: ui
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
      containers:
      - name: ui
        image: "{{ .Values.ui.image.repository }}:{{ default (default .Chart.AppVersion .Values.global.image.tag) .Values.ui.image.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.ui.service.targetPort }}
          protocol: TCP
        env:
        - name: OPENDEPOT_SERVER_HOST
          value: "{{ default (printf "server.%s.svc.cluster.local:80" .Values.global.namespace) .Values.ui.serverHost }}"
        - name: NEXT_PUBLIC_BASE_URL
          value: {{ .Values.ui.baseUrl | quote }}
        {{- if .Values.ui.oidc.enabled }}
        - name: OIDC_ISSUER_URL
          value: {{ .Values.ui.oidc.issuerUrl | quote }}
        - name: OIDC_CLIENT_ID
          value: {{ .Values.ui.oidc.clientId | quote }}
        - name: OIDC_SCOPES
          value: {{ .Values.ui.oidc.scopes | quote }}
        - name: OIDC_CALLBACK_PATH
          value: {{ .Values.ui.oidc.callbackPath | quote }}
        {{- if .Values.ui.oidc.authzUrl }}
        - name: OIDC_AUTHZ_URL
          value: {{ .Values.ui.oidc.authzUrl | quote }}
        {{- end }}
        {{- if .Values.ui.oidc.clientSecretName }}
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.ui.oidc.clientSecretName }}
              key: clientSecret
        {{- end }}
        {{- end }}
        {{- if .Values.ui.auth.devTokenInput.enabled }}
        - name: DEV_TOKEN_INPUT_ENABLED
          value: "true"
        {{- end }}
        - name: SESSION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ required "ui.sessionPasswordSecretName must be set when ui.enabled=true" .Values.ui.sessionPasswordSecretName }}
              key: sessionPassword
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf.template
          subPath: nginx.conf
          readOnly: true
        - name: nginx-tmp
          mountPath: /tmp
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        resources:
          {{- toYaml .Values.ui.resources | nindent 10 }}
      volumes:
      - name: nginx-config
        configMap:
          name: ui-nginx-config
      - name: nginx-tmp
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      {{- with .Values.ui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
