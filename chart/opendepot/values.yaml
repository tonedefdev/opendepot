##
## OpenDepot Helm Chart Values
##

## Global settings
global:
  namespace: opendepot-system
  imagePullPolicy: IfNotPresent
  image:
    tag: ""  # Defaults to Chart.AppVersion when empty; set to override.

## Version Service (Core - handles GitHub fetching and storage)
version:
  enabled: true
  replicaCount: 1
  # zapLogLevel sets --zap-log-level on the controller. Leave empty for the
  # default (info). Set to 5 to enable verbose debug logging.
  zapLogLevel: ""
  image:
    repository: ghcr.io/tonedefdev/opendepot/version-controller
    tag: ""
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 4Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

## Module Service (Orchestrates version creation and management)
module:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/tonedefdev/opendepot/module-controller
    tag: ""  # Overrides global.image.tag when set
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

## Depot Service (Optional - pulls modules based on version constraints)
depot:
  enabled: true  # Set to true to enable the Depot controller
  replicaCount: 1
  image:
    repository: ghcr.io/tonedefdev/opendepot/depot-controller
    tag: ""  # Overrides global.image.tag when set
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

## Provider Service (Manages provider versions from HashiCorp Releases API)
provider:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/tonedefdev/opendepot/provider-controller
    tag: ""  # Overrides global.image.tag when set
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

## Server Service (Registry Protocol API)
server:
  enabled: true
  replicaCount: 1
  anonymousAuth: false
  useBearerToken: true
  # OIDC authentication settings. When enabled, the server validates OIDC JWTs
  # issued by Dex (or any compatible OIDC provider) before proxying requests to
  # the Kubernetes API. This is the recommended auth mode for production; it
  # enables `tofu login <host>` without distributing kubeconfigs or SA tokens.
  oidc:
    # enabled toggles OIDC JWT validation. Requires dex.enabled=true (or an
    # external OIDC provider configured via issuerUrl below).
    enabled: false
    # issuerUrl is the OIDC issuer URL. When blank and dex.enabled=true, the
    # Helm template auto-derives the in-cluster Dex service URL.
    issuerUrl: ""
    # clientId must match the id field of the Dex static client configured below.
    clientId: "opendepot"
    # clientSecretName is the name of the Kubernetes Secret that holds the
    # clientSecret key. When blank, the chart creates the Secret automatically
    # from the clientSecret value below (only if dex.enabled=true).
    clientSecretName: ""
    # clientSecret is used to create the Dex client Secret when clientSecretName
    # is blank. This value is written to a Secret — do not store it in plain text
    # in production; use an external secret operator instead.
    clientSecret: ""
    # groupsClaim is the JWT claim name containing the OIDC groups.
    # Only used when GroupBinding resources are deployed. Defaults to "groups".
    # Change to "cognito:groups", "roles", etc. when using a non-standard IdP.
    groupsClaim: ""
  image:
    repository: ghcr.io/tonedefdev/opendepot/server
    tag: ""  # Overrides global.image.tag when set
  service:
    type: LoadBalancer
    port: 80
    targetPort: 8080
  ingress:
    enabled: false
    istio:
      enabled: false
      hosts:
      - opendepot.defdev.io
      gateway: istio-ingress/istio-ingress-gateway
    hosts:
      - host: opendepot.defdev.io
        paths:
          - path: /
            pathType: Prefix
    tls: []
  tls:
    # Set to true if using TLS certificates (volumes must be configured separately)
    enabled: false
    certPath: /etc/tls/tls.crt
    keyPath: /etc/tls/tls.key
  gpg:
    # Name of a Kubernetes Secret containing the GPG env vars for provider signing.
    # The secret must have keys: OPENDEPOT_PROVIDER_GPG_KEY_ID, OPENDEPOT_PROVIDER_GPG_ASCII_ARMOR,
    # OPENDEPOT_PROVIDER_GPG_PRIVATE_KEY_BASE64, and optionally OPENDEPOT_PROVIDER_GPG_SOURCE_URL.
    secretName: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Pod Disruption Budget
  podDisruptionBudget:
    enabled: false
    minAvailable: 2

## Service Account configuration
serviceAccount:
  # Automatically create service accounts for each controller
  create: true
  # Annotations to add to the service accounts
  annotations: {}

## RBAC configuration
rbac:
  # Create RBAC roles and role bindings
  create: true
  # When true, use namespace-scoped Role/RoleBinding instead of ClusterRole/ClusterRoleBinding.
  # Controllers will only watch resources in global.namespace.
  scopeToNamespace: false

## Storage configuration
storage:
  filesystem:
    # Enable shared volume for filesystem-based module storage
    enabled: false
    # Mount path inside containers (used by both server and version-controller)
    mountPath: /data/modules
    # Use a hostPath volume instead of a PVC (for local development with kind)
    hostPath: ""
    # StorageClass must support ReadWriteMany access mode (ignored when hostPath is set)
    storageClassName: ""
    # Size of the PersistentVolumeClaim (ignored when hostPath is set)
    size: 10Gi

## Scanning configuration (Trivy-based vulnerability and IaC scanning)
scanning:
  # Enable Trivy-based scanning. When true, the version-controller automatically
  # uses the image variant tagged with the -scanning suffix, which bundles the
  # Trivy binary. Module IaC scanning (HCL misconfiguration detection) is active
  # at this level — no PVC or CronJob infrastructure is required.
  enabled: false
  # Enable provider binary and source scanning. Requires scanning.enabled=true.
  # When true, creates the Trivy vulnerability DB PVC and the trivy-db-updater
  # CronJob, and mounts the cache volume into the version-controller.
  providerScanning: false
  # Mount path inside the version-controller container for the Trivy DB cache.
  # Only used when providerScanning is true.
  cacheMountPath: /var/cache/trivy
  # Pass --offline-scan to Trivy, preventing network calls during scans.
  # Only relevant when providerScanning is true.
  offline: true
  # Block reconciliation when CRITICAL vulnerabilities are found (modules or providers).
  blockOnCritical: false
  # Block reconciliation when HIGH vulnerabilities are found (modules or providers).
  blockOnHigh: false
  # PersistentVolumeClaim for the shared Trivy vulnerability database.
  # Only created when providerScanning is true.
  cache:
    # StorageClass must support ReadWriteMany so that scanner and updater pods can share it.
    # For single-node environments (e.g. Kind), ReadWriteOnce with the default storage class works.
    storageClassName: ""
    # Access mode for the Trivy cache PVC. ReadWriteMany is required when using the db-updater
    # CronJob alongside the version controller on separate nodes. Use ReadWriteOnce for Kind.
    accessMode: ReadWriteMany
    # Size of the Trivy DB cache PVC
    size: 1Gi
  # CronJob that runs 'trivy image --download-db-only' on a schedule to keep the offline DB current.
  # Only created when providerScanning is true.
  dbUpdater:
    # Cron schedule for the Trivy DB update job (default: 02:00 UTC daily)
    schedule: "0 2 * * *"
    image:
      repository: aquasec/trivy
      tag: "0.70.0"

## Dex OIDC provider (subchart)
# When dex.enabled=true, Dex is deployed as an OIDC identity broker. It
# federates upstream IdPs (Entra ID, Okta, GitHub, LDAP, etc.) and issues
# standard OIDC JWTs that the OpenDepot server validates locally.
#
# NOTE: staticPasswords is provided here only for automated e2e testing. It
# MUST NOT be used in production — disable it by leaving staticPasswords.enabled
# as false and configure a real connector instead.
dex:
  enabled: false
  config:
    # issuer is the public URL of the Dex service. Clients redirect here for
    # authorization. Change this to the external URL of your Dex deployment.
    issuer: ""
    storage:
      type: memory
    oauth2:
      responseTypes:
        - code
      grantTypes:
        - authorization_code
        - "urn:ietf:params:oauth:grant-type:device_code"
      skipApprovalScreen: true
    staticClients:
      - id: opendepot
        name: OpenDepot
        secretEnv: OPENDEPOT_DEX_CLIENT_SECRET
        redirectURIs:
          - http://localhost:10000
          - http://localhost:10001
          - http://localhost:10002
          - http://localhost:10003
          - http://localhost:10004
          - http://localhost:10005
          - http://localhost:10006
          - http://localhost:10007
          - http://localhost:10008
          - http://localhost:10009
          - http://localhost:10010
    # connectors is where operators add upstream IdP connector configuration.
    # Example GitHub connector:
    #   connectors:
    #     - type: github
    #       id: github
    #       name: GitHub
    #       config:
    #         clientID: <github-app-client-id>
    #         clientSecret: <github-app-client-secret>
    #         redirectURI: https://<dex-host>/dex/callback
    connectors: []
    # staticPasswords is for e2e testing only — NEVER enable in production.
    enablePasswordDB: false
    staticPasswords: []
  envFrom:
    - secretRef:
        name: opendepot-dex-client-secret
        optional: true
