---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: depots.opendepot.defdev.io
spec:
  group: opendepot.defdev.io
  names:
    kind: Depot
    listKind: DepotList
    plural: depots
    singular: depot
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: The global configuration applied to all modules managed by this
        Depot
      jsonPath: .spec.globalConfig
      name: GlobalConfig
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Depot is the Schema for the depots API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DepotSpec defines the desired state of Depot.
            properties:
              global:
                description: |-
                  The configuration that should be applied to all modules that are part
                  of this Depot.
                properties:
                  githubClientConfig:
                    properties:
                      useAuthenticatedClient:
                        description: |-
                          This flag determines whether the GitHub client used to download modules
                          will be authenticated with a Github App. It's highly recommended
                          to enable this flag to avoid GitHub API rate limiting. When enabled, the namespace where the Module resource exists
                          must contain a Secret named 'opendepot-github-application-secret'. The secret must contain a githubAppID,
                          githubInstallID, and githubPrivateKey field. The private key must also be base64 encoded before being added
                          as data to the secret. When accessed, the controller will base64 decode the key to build an in-memory client
                          to authenticate with the Github API.
                        type: boolean
                    type: object
                  moduleConfig:
                    description: |-
                      ModuleConfig is the configuration settings for the Module and for each
                      Version created by the Module controller.
                    properties:
                      fileFormat:
                        description: |-
                          The file format of the module
                          This must be one of 'zip' or 'tar'.
                        type: string
                      githubClientConfig:
                        description: The Github client configuration settings.
                        properties:
                          useAuthenticatedClient:
                            description: |-
                              This flag determines whether the GitHub client used to download modules
                              will be authenticated with a Github App. It's highly recommended
                              to enable this flag to avoid GitHub API rate limiting. When enabled, the namespace where the Module resource exists
                              must contain a Secret named 'opendepot-github-application-secret'. The secret must contain a githubAppID,
                              githubInstallID, and githubPrivateKey field. The private key must also be base64 encoded before being added
                              as data to the secret. When accessed, the controller will base64 decode the key to build an in-memory client
                              to authenticate with the Github API.
                            type: boolean
                        type: object
                      immutable:
                        description: |-
                          When true, enforces that the ChecksumSHA256 of the module archive
                          always matches the value stored in this field and in any destination storage config.
                        type: boolean
                      name:
                        description: |-
                          The OpenTofu registry module name (short form), e.g. 'key-pair' for the registry path
                          terraform-aws-modules/key-pair/aws. Used as the Kubernetes resource name for the resulting Module CR.
                        type: string
                      provider:
                        description: The main terraform or tofu provider required
                          for this module.
                        type: string
                      repoOwner:
                        description: |-
                          The namespace (organization) of the module in the OpenTofu registry, e.g. 'terraform-aws-modules'.
                          Also used as the GitHub organization for downloading module artifacts.
                        type: string
                      repoUrl:
                        description: |-
                          The full URL of the source repository on GitHub, e.g.
                          'https://github.com/terraform-aws-modules/terraform-aws-key-pair'. When omitted, the Depot
                          controller looks up the source URL from the OpenTofu registry (api.opentofu.org). If the
                          registry lookup fails, an error is returned and the Module CR is not created/updated.
                        type: string
                      storageConfig:
                        description: The external storage configuration settings.
                        properties:
                          azureStorage:
                            properties:
                              accountName:
                                description: The Azure Storage Account name.
                                type: string
                              accountUrl:
                                description: The Azure Storage Account URL.
                                type: string
                              resourceGroup:
                                description: The Azure Resource Group where the Azure
                                  Storage Account is located.
                                type: string
                              subscriptionID:
                                description: The Azure subscription ID where the Azure
                                  Storage Account is located.
                                type: string
                            required:
                            - accountName
                            - accountUrl
                            - resourceGroup
                            - subscriptionID
                            type: object
                          fileSystem:
                            description: The configuration settings for storing Versions
                              on a local filesystem.
                            properties:
                              directoryPath:
                                description: The directory path on the file system
                                  where the Version will be stored.
                                type: string
                            type: object
                          gcs:
                            description: The configuration settings for storing Versions
                              in a Google Cloud Storage bucket.
                            properties:
                              bucket:
                                description: The GCS bucket name.
                                type: string
                            required:
                            - bucket
                            type: object
                          presign:
                            description: Presign is the optional configuration for
                              pre-signed URL generation.
                            properties:
                              enabled:
                                description: When true, download requests are redirected
                                  to the storage backend via a pre-signed URL.
                                type: boolean
                              fallbackToProxy:
                                default: true
                                description: |-
                                  When true, if pre-sign generation fails the server falls back to proxying the download.
                                  Defaults to true.
                                type: boolean
                              ttl:
                                default: 15m
                                description: |-
                                  TTL controls how long the pre-signed URL remains valid (e.g. "15m", "1h").
                                  If omitted, defaults to 15 minutes.
                                type: string
                            type: object
                          s3:
                            description: The configuration settings for storing Versions
                              in an Amazon S3 bucket.
                            properties:
                              bucket:
                                description: The S3 bucket name.
                                type: string
                              key:
                                description: |-
                                  The S3 bucket key, ie: 'my/bucket/prefix'
                                  The file name will be automatically generated by the opendepot-module-controller.
                                type: string
                              region:
                                description: The AWS region for the bucket.
                                type: string
                            required:
                            - bucket
                            - region
                            type: object
                        type: object
                      versionConstraints:
                        description: |-
                          A comma separated list of version constraints such as
                          '1.2.1' or '>= 1.0.0, < 2.0.0' or '~> 1.0.0, != 1.0.2'. This field is only
                          respected by the Depot controller.
                        type: string
                      versionHistoryLimit:
                        description: The number of versions to keep stored in the
                          registry at any given time.
                        type: integer
                    type: object
                  storageConfig:
                    description: StorageConfig holds details about how to store a
                      Version.
                    properties:
                      azureStorage:
                        properties:
                          accountName:
                            description: The Azure Storage Account name.
                            type: string
                          accountUrl:
                            description: The Azure Storage Account URL.
                            type: string
                          resourceGroup:
                            description: The Azure Resource Group where the Azure
                              Storage Account is located.
                            type: string
                          subscriptionID:
                            description: The Azure subscription ID where the Azure
                              Storage Account is located.
                            type: string
                        required:
                        - accountName
                        - accountUrl
                        - resourceGroup
                        - subscriptionID
                        type: object
                      fileSystem:
                        description: The configuration settings for storing Versions
                          on a local filesystem.
                        properties:
                          directoryPath:
                            description: The directory path on the file system where
                              the Version will be stored.
                            type: string
                        type: object
                      gcs:
                        description: The configuration settings for storing Versions
                          in a Google Cloud Storage bucket.
                        properties:
                          bucket:
                            description: The GCS bucket name.
                            type: string
                        required:
                        - bucket
                        type: object
                      presign:
                        description: Presign is the optional configuration for pre-signed
                          URL generation.
                        properties:
                          enabled:
                            description: When true, download requests are redirected
                              to the storage backend via a pre-signed URL.
                            type: boolean
                          fallbackToProxy:
                            default: true
                            description: |-
                              When true, if pre-sign generation fails the server falls back to proxying the download.
                              Defaults to true.
                            type: boolean
                          ttl:
                            default: 15m
                            description: |-
                              TTL controls how long the pre-signed URL remains valid (e.g. "15m", "1h").
                              If omitted, defaults to 15 minutes.
                            type: string
                        type: object
                      s3:
                        description: The configuration settings for storing Versions
                          in an Amazon S3 bucket.
                        properties:
                          bucket:
                            description: The S3 bucket name.
                            type: string
                          key:
                            description: |-
                              The S3 bucket key, ie: 'my/bucket/prefix'
                              The file name will be automatically generated by the opendepot-module-controller.
                            type: string
                          region:
                            description: The AWS region for the bucket.
                            type: string
                        required:
                        - bucket
                        - region
                        type: object
                    type: object
                required:
                - storageConfig
                type: object
              moduleConfigs:
                description: The module configuration and version details for each
                  module that should be managed by the Depot controller.
                items:
                  description: |-
                    ModuleConfig is the configuration settings for the Module and for each
                    Version created by the Module controller.
                  properties:
                    fileFormat:
                      description: |-
                        The file format of the module
                        This must be one of 'zip' or 'tar'.
                      type: string
                    githubClientConfig:
                      description: The Github client configuration settings.
                      properties:
                        useAuthenticatedClient:
                          description: |-
                            This flag determines whether the GitHub client used to download modules
                            will be authenticated with a Github App. It's highly recommended
                            to enable this flag to avoid GitHub API rate limiting. When enabled, the namespace where the Module resource exists
                            must contain a Secret named 'opendepot-github-application-secret'. The secret must contain a githubAppID,
                            githubInstallID, and githubPrivateKey field. The private key must also be base64 encoded before being added
                            as data to the secret. When accessed, the controller will base64 decode the key to build an in-memory client
                            to authenticate with the Github API.
                          type: boolean
                      type: object
                    immutable:
                      description: |-
                        When true, enforces that the ChecksumSHA256 of the module archive
                        always matches the value stored in this field and in any destination storage config.
                      type: boolean
                    name:
                      description: |-
                        The OpenTofu registry module name (short form), e.g. 'key-pair' for the registry path
                        terraform-aws-modules/key-pair/aws. Used as the Kubernetes resource name for the resulting Module CR.
                      type: string
                    provider:
                      description: The main terraform or tofu provider required for
                        this module.
                      type: string
                    repoOwner:
                      description: |-
                        The namespace (organization) of the module in the OpenTofu registry, e.g. 'terraform-aws-modules'.
                        Also used as the GitHub organization for downloading module artifacts.
                      type: string
                    repoUrl:
                      description: |-
                        The full URL of the source repository on GitHub, e.g.
                        'https://github.com/terraform-aws-modules/terraform-aws-key-pair'. When omitted, the Depot
                        controller looks up the source URL from the OpenTofu registry (api.opentofu.org). If the
                        registry lookup fails, an error is returned and the Module CR is not created/updated.
                      type: string
                    storageConfig:
                      description: The external storage configuration settings.
                      properties:
                        azureStorage:
                          properties:
                            accountName:
                              description: The Azure Storage Account name.
                              type: string
                            accountUrl:
                              description: The Azure Storage Account URL.
                              type: string
                            resourceGroup:
                              description: The Azure Resource Group where the Azure
                                Storage Account is located.
                              type: string
                            subscriptionID:
                              description: The Azure subscription ID where the Azure
                                Storage Account is located.
                              type: string
                          required:
                          - accountName
                          - accountUrl
                          - resourceGroup
                          - subscriptionID
                          type: object
                        fileSystem:
                          description: The configuration settings for storing Versions
                            on a local filesystem.
                          properties:
                            directoryPath:
                              description: The directory path on the file system where
                                the Version will be stored.
                              type: string
                          type: object
                        gcs:
                          description: The configuration settings for storing Versions
                            in a Google Cloud Storage bucket.
                          properties:
                            bucket:
                              description: The GCS bucket name.
                              type: string
                          required:
                          - bucket
                          type: object
                        presign:
                          description: Presign is the optional configuration for pre-signed
                            URL generation.
                          properties:
                            enabled:
                              description: When true, download requests are redirected
                                to the storage backend via a pre-signed URL.
                              type: boolean
                            fallbackToProxy:
                              default: true
                              description: |-
                                When true, if pre-sign generation fails the server falls back to proxying the download.
                                Defaults to true.
                              type: boolean
                            ttl:
                              default: 15m
                              description: |-
                                TTL controls how long the pre-signed URL remains valid (e.g. "15m", "1h").
                                If omitted, defaults to 15 minutes.
                              type: string
                          type: object
                        s3:
                          description: The configuration settings for storing Versions
                            in an Amazon S3 bucket.
                          properties:
                            bucket:
                              description: The S3 bucket name.
                              type: string
                            key:
                              description: |-
                                The S3 bucket key, ie: 'my/bucket/prefix'
                                The file name will be automatically generated by the opendepot-module-controller.
                              type: string
                            region:
                              description: The AWS region for the bucket.
                              type: string
                          required:
                          - bucket
                          - region
                          type: object
                      type: object
                    versionConstraints:
                      description: |-
                        A comma separated list of version constraints such as
                        '1.2.1' or '>= 1.0.0, < 2.0.0' or '~> 1.0.0, != 1.0.2'. This field is only
                        respected by the Depot controller.
                      type: string
                    versionHistoryLimit:
                      description: The number of versions to keep stored in the registry
                        at any given time.
                      type: integer
                  type: object
                type: array
              pollingIntervalMinutes:
                description: |-
                  The polling interval in minutes for how often the Depot controller should check for new versions of the modules it manages.
                  If not specified, the default is 0.
                type: integer
              providerConfigs:
                description: The provider configuration and version details for each
                  provider that should be managed by the Depot controller.
                items:
                  description: ProviderConfig is the configuration settings for the
                    Provider and for each Version created by the Provider controller.
                  properties:
                    architectures:
                      description: The architecture(s) that the provider supports.
                        This is used to set the 'arch' constraint in the provider's
                        versions.
                      items:
                        type: string
                      type: array
                    githubClientConfig:
                      description: |-
                        The Github client configuration settings for source scanning. When set with
                        useAuthenticatedClient: true, the version controller will use a GitHub App to
                        authenticate requests when fetching the provider's go.mod for source scanning.
                        This is recommended for private source repositories and to avoid GitHub API rate limiting.
                        The namespace where the Version resource exists must contain a Secret named
                        'opendepot-github-application-secret' with githubAppID, githubInstallID, and
                        githubPrivateKey fields (private key must be base64 encoded).
                      properties:
                        useAuthenticatedClient:
                          description: |-
                            This flag determines whether the GitHub client used to download modules
                            will be authenticated with a Github App. It's highly recommended
                            to enable this flag to avoid GitHub API rate limiting. When enabled, the namespace where the Module resource exists
                            must contain a Secret named 'opendepot-github-application-secret'. The secret must contain a githubAppID,
                            githubInstallID, and githubPrivateKey field. The private key must also be base64 encoded before being added
                            as data to the secret. When accessed, the controller will base64 decode the key to build an in-memory client
                            to authenticate with the Github API.
                          type: boolean
                      type: object
                    name:
                      description: |-
                        The name of the provider. If omitted, the name of the Provider resource
                        is used in its place.
                      type: string
                    namespace:
                      description: |-
                        The namespace (organization) of the provider in the OpenTofu registry,
                        e.g. 'hashicorp', 'integrations', 'DataDog'. Defaults to 'hashicorp' when omitted,
                        preserving backwards compatibility for existing Provider resources.
                      type: string
                    operatingSystems:
                      description: The OS(s) that the provider supports. This is used
                        to set the 'os' constraint in the provider's versions.
                      items:
                        type: string
                      type: array
                    sourceRepository:
                      description: |-
                        The URL of the provider's source repository on GitHub, e.g. 'https://github.com/hashicorp/terraform-provider-aws'.
                        When omitted, OpenDepot looks up the repository from the OpenTofu registry (api.opentofu.org).
                        If the registry lookup fails, it falls back to 'github.com/{namespace}/terraform-provider-{name}'.
                        If the repository cannot be resolved, scanning falls back to binary-only mode.
                      type: string
                    storageConfig:
                      description: The external storage configuration settings.
                      properties:
                        azureStorage:
                          properties:
                            accountName:
                              description: The Azure Storage Account name.
                              type: string
                            accountUrl:
                              description: The Azure Storage Account URL.
                              type: string
                            resourceGroup:
                              description: The Azure Resource Group where the Azure
                                Storage Account is located.
                              type: string
                            subscriptionID:
                              description: The Azure subscription ID where the Azure
                                Storage Account is located.
                              type: string
                          required:
                          - accountName
                          - accountUrl
                          - resourceGroup
                          - subscriptionID
                          type: object
                        fileSystem:
                          description: The configuration settings for storing Versions
                            on a local filesystem.
                          properties:
                            directoryPath:
                              description: The directory path on the file system where
                                the Version will be stored.
                              type: string
                          type: object
                        gcs:
                          description: The configuration settings for storing Versions
                            in a Google Cloud Storage bucket.
                          properties:
                            bucket:
                              description: The GCS bucket name.
                              type: string
                          required:
                          - bucket
                          type: object
                        presign:
                          description: Presign is the optional configuration for pre-signed
                            URL generation.
                          properties:
                            enabled:
                              description: When true, download requests are redirected
                                to the storage backend via a pre-signed URL.
                              type: boolean
                            fallbackToProxy:
                              default: true
                              description: |-
                                When true, if pre-sign generation fails the server falls back to proxying the download.
                                Defaults to true.
                              type: boolean
                            ttl:
                              default: 15m
                              description: |-
                                TTL controls how long the pre-signed URL remains valid (e.g. "15m", "1h").
                                If omitted, defaults to 15 minutes.
                              type: string
                          type: object
                        s3:
                          description: The configuration settings for storing Versions
                            in an Amazon S3 bucket.
                          properties:
                            bucket:
                              description: The S3 bucket name.
                              type: string
                            key:
                              description: |-
                                The S3 bucket key, ie: 'my/bucket/prefix'
                                The file name will be automatically generated by the opendepot-module-controller.
                              type: string
                            region:
                              description: The AWS region for the bucket.
                              type: string
                          required:
                          - bucket
                          - region
                          type: object
                      type: object
                    versionConstraints:
                      description: |-
                        A comma-separated list of version constraints such as
                        '1.2.1' or '>= 1.0.0, < 2.0.0' or '~> 1.0.0'. This field is only
                        respected by the Depot controller.
                      type: string
                    versionHistoryLimit:
                      description: The version history limit for the provider.
                      type: integer
                  type: object
                type: array
            type: object
          status:
            description: DepotStatus defines the observed state of Depot.
            properties:
              modules:
                description: The list of Module resource names created and managed
                  by this Depot.
                items:
                  type: string
                type: array
              providers:
                description: The list of Provider resource names created and managed
                  by this Depot.
                items:
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
