worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 10m;

    # Write access logs to stdout.
    access_log /dev/stdout combined;

    # Upstream: OpenDepot server service (registry API).
    # The service name is resolved via cluster DNS: server.<namespace>.svc.cluster.local.
    # Override OPENDEPOT_SERVER_HOST at deploy time (Helm configmap injection).
    upstream opendepot_server {
        server ${OPENDEPOT_SERVER_HOST};
    }

    # Upstream: Next.js runtime (same container, different port).
    upstream nextjs {
        server 127.0.0.1:3000;
    }

    server {
        listen 80;
        server_name _;

        # Security headers.
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # Terraform/OpenTofu registry protocol and OpenDepot API — proxy to server.
        location /.well-known/terraform.json {
            proxy_pass         http://opendepot_server;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
        }

        location /opendepot/ {
            proxy_pass         http://opendepot_server;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;
            # Preserve Authorization header for protocol endpoints.
            proxy_set_header   Authorization     $http_authorization;
        }

        # Everything else — proxy to the Next.js app.
        location / {
            proxy_pass          http://nextjs;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_set_header    Host              $host;
            proxy_set_header    X-Forwarded-For   $remote_addr;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    X-Request-ID      $request_id;
            proxy_read_timeout  60s;
        }
    }
}
