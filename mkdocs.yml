site_name: Kerrareg
site_description: Self-hosted OpenTofu/Terraform Module and Provider Registry for Kubernetes
# site_url: https://<your-org>.github.io/kerrareg/docs/
repo_url: https://github.com/tonedefdev/kerrareg
repo_name: tonedefdev/kerrareg
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  logo: img/kerrareg.svg
  favicon: img/kerrareg.svg
  palette:
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Contributing: contributing.md
  - Helm Chart: helm-chart.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
