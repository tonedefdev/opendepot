name: Storage Integration Tests

env:
  clientId: b0a4a5e5-0d99-43c0-8509-935b84199b7c
  tenantId: 56460368-1f7f-476c-8a7c-b2225c26eb1e
  subscriptionId: 7d069d72-e281-4e33-911b-aedadcb4f773

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'pkg/storage/**'
      - 'test/**'
      - '.github/workflows/storage-integration.yaml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  s3-integration:
    name: S3 storage integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.0"

      - name: Debug OIDC token claims
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq .

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::665848848438:role/opendepot-github-role
          aws-region: us-west-2

      - name: Run S3 integration tests
        working-directory: test/integration
        env:
          AWS_REGION: us-west-2
          # Disable workspace mode so the module's own replace directives
          # are used, avoiding a grpc/stats/opentelemetry ambiguous-import
          # conflict that arises when the workspace module graph is merged.
          GOWORK: "off"
        run: go test -tags=integration -v -count=1 -timeout 15m .

  gcs-integration:
    name: GCS storage integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.0"

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/789629963060/locations/global/workloadIdentityPools/github-oidc-pool/providers/github-provider
          service_account: opendepot-test@opendepot-495604.iam.gserviceaccount.com

      - name: Run GCS integration tests
        working-directory: test/integration
        env:
          GCP_PROJECT: opendepot-495604
          GCP_LOCATION: us
          # Disable workspace mode — same reason as s3-integration job.
          GOWORK: "off"
        run: go test -tags=integration -v -count=1 -timeout 15m . -run TestGCSStorageIntegration

  azure-integration:
    name: Azure Blob Storage integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.0"

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.clientId }}
          tenant-id: ${{ env.tenantId }}
          subscription-id: ${{ env.subscriptionId }}

      - name: Run Azure Blob Storage integration tests
        working-directory: test/integration
        env:
          AZURE_SUBSCRIPTION_ID: ${{ env.subscriptionId }}
          AZURE_LOCATION: westus2
          # Required by the azurerm OpenTofu provider for OIDC authentication.
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ env.clientId }}
          ARM_TENANT_ID: ${{ env.tenantId }}
          ARM_SUBSCRIPTION_ID: ${{ env.subscriptionId }}
          # Disable workspace mode — same reason as s3-integration job.
          GOWORK: "off"
        run: go test -tags=integration -v -count=1 -timeout 15m . -run TestAzureBlobStorageIntegration
