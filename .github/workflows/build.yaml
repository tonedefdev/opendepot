name: Build Docker Images

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      matrix:
        service:
          - name: version-controller
            path: services/version
            buildArgs: ""
            tagSuffix: ""
          - name: version-controller
            path: services/version
            buildArgs: "INCLUDE_TRIVY=true"
            tagSuffix: "-scanning"
          - name: module-controller
            path: services/module
            buildArgs: ""
            tagSuffix: ""
          - name: depot-controller
            path: services/depot
            buildArgs: ""
            tagSuffix: ""
          - name: server
            path: services/server
            buildArgs: ""
            tagSuffix: ""
          - name: provider-controller
            path: services/provider
            buildArgs: ""
            tagSuffix: ""
        arch:
          - amd64
          - arm64
    
    name: Build ${{ matrix.service.name }} (${{ matrix.arch }})
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service.name }}
          flavor: |
            suffix=-${{ matrix.arch }}${{ matrix.service.tagSuffix }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,enable=${{ github.ref_type != 'tag' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.path }}/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.service.buildArgs }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  manifest:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        service:
          - name: version-controller
            tagSuffix: ""
          - name: version-controller
            tagSuffix: "-scanning"
          - name: module-controller
            tagSuffix: ""
          - name: depot-controller
            tagSuffix: ""
          - name: server
            tagSuffix: ""
          - name: provider-controller
            tagSuffix: ""

    name: Manifest ${{ matrix.service.name }}${{ matrix.service.tagSuffix }}

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service.name }}
          flavor: |
            suffix=${{ matrix.service.tagSuffix }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,enable=${{ github.ref_type != 'tag' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push multi-arch manifest
        run: |
          SUFFIX="${{ matrix.service.tagSuffix }}"
          for TAG in $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' '); do
            if [ -n "$SUFFIX" ]; then
              # Build job produced tags like: 0.2.7-amd64-scanning
              # Strip the tagSuffix from the end of TAG to get the base, then append arch+suffix
              BASE="${TAG%$SUFFIX}"
              docker buildx imagetools create -t "${TAG}" \
                "${BASE}-amd64${SUFFIX}" \
                "${BASE}-arm64${SUFFIX}" || true
            else
              docker buildx imagetools create -t "${TAG}" \
                "${TAG}-amd64" \
                "${TAG}-arm64" || true
            fi
          done

  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [build, manifest]
    if: always()
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build.result }}" = "success" ] && [ "${{ needs.manifest.result }}" = "success" ]; then
            echo "✅ All Docker images built and manifests created successfully"
            exit 0
          else
            echo "❌ Docker build or manifest creation failed"
            exit 1
          fi
